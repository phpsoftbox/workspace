x-php-build: &php-build
  context: .
  dockerfile: docker/php/Dockerfile
  args:
    PHP_FPM_IMAGE: ${PHP_FPM_IMAGE:-php:8.5-fpm}
    NODE_MAJOR: ${NODE_MAJOR:-22}
    XDEBUG_VERSION: ${XDEBUG_VERSION:-3.5.0}
    USER_NAME: ${USER_NAME:-dev}
    USER_ID: ${USER_ID:-1000}
    GROUP_ID: ${GROUP_ID:-1000}

x-app-volume: &app-volume ${BACKEND_PATH:-./local/backend}:/app:delegated

x-php-environment: &php-environment
  PHP_IDE_CONFIG: ${PHP_IDE_CONFIG:-serverName=backend}
  XDEBUG_MODE: ${XDEBUG_MODE:-debug,develop}
  APP_ENV: ${APP_ENV:-dev}
  APP_DEBUG: ${APP_DEBUG:-1}
  APP_URL: ${APP_URL:-http://localhost:8080}
  APP_KEY: ${APP_KEY:-}
  APP_INFLECTOR_LANG: ${APP_INFLECTOR_LANG:-en}
  APP_DB_MAIN_DSN: ${APP_DB_MAIN_DSN:-mariadb://app:app@mariadb:3306/app}
  APP_DB_SEARCH_DSN: ${APP_DB_SEARCH_DSN:-postgres://app:app@postgres:5432/app}
  APP_DB_MIGRATIONS_BASE: ${APP_DB_MIGRATIONS_BASE:-database/migrations}
  APP_STORAGE_DISK: ${APP_STORAGE_DISK:-local}
  APP_STORAGE_URL: ${APP_STORAGE_URL:-/storage}
  APP_SESSION_SECURE: ${APP_SESSION_SECURE:-auto}
  APP_SESSION_DOMAIN: ${APP_SESSION_DOMAIN:-}
  VITE_DEV_SERVER: ${VITE_DEV_SERVER:-http://localhost:5173}
  VITE_PORT: ${VITE_PORT:-5173}
  COMPOSER_CACHE_DIR: /home/${USER_NAME:-dev}/.cache/composer

services:
  nginx:
    image: nginx:1.29-alpine
    profiles:
      - web
    depends_on:
      - php-fpm
    ports:
      - "127.0.0.1:${NGINX_HTTP_PORT:-8080}:80"
    volumes:
      - ${BACKEND_PATH:-./local/backend}:/app:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - workspace

  php-fpm:
    build:
      <<: *php-build
      target: fpm
    profiles:
      - web
    working_dir: /app
    environment:
      <<: *php-environment
    ports:
      - "127.0.0.1:${VITE_PORT:-5173}:5173"
    volumes:
      - *app-volume
      - composer_cache:/home/${USER_NAME:-dev}/.cache/composer
      - yarn_cache:/home/${USER_NAME:-dev}/.cache/yarn
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - workspace

  php-cli:
    build:
      <<: *php-build
      target: cli
    profiles:
      - cli
    working_dir: /app
    tty: true
    stdin_open: true
    environment:
      <<: *php-environment
    command: ["tail", "-f", "/dev/null"]
    volumes:
      - *app-volume
      - composer_cache:/home/${USER_NAME:-dev}/.cache/composer
      - yarn_cache:/home/${USER_NAME:-dev}/.cache/yarn
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - workspace

  frontend:
    image: node:22-alpine
    profiles:
      - frontend
    working_dir: /app
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    command: sh -lc "corepack enable && yarn install && yarn dev --host 0.0.0.0"
    environment:
      VITE_DEV_SERVER: ${VITE_DEV_SERVER:-http://localhost:5173}
      VITE_PORT: ${VITE_PORT:-5173}
    ports:
      - "127.0.0.1:${VITE_PORT:-5173}:5173"
    volumes:
      - ${FRONTEND_PATH:-./local/frontend}:/app:delegated
      - frontend_yarn_cache:/home/node/.cache/yarn
    networks:
      - workspace

  mariadb:
    image: ${MARIADB_IMAGE:-mariadb:11.8}
    profiles:
      - mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-app}
      MARIADB_USER: ${MARIADB_USER:-app}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-app}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root}
    ports:
      - "127.0.0.1:${MARIADB_PORT:-13306}:3306"
    volumes:
      - ./docker/mariadb/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./docker/mariadb/init:/docker-entrypoint-initdb.d:ro
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u root -p$${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks:
      - workspace

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    profiles:
      - postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-15432}:5432"
    volumes:
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks:
      - workspace

  mongodb:
    image: ${MONGODB_IMAGE:-mongo:8}
    profiles:
      - mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-app}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-app}
    ports:
      - "127.0.0.1:${MONGODB_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet -u \"$${MONGO_INITDB_ROOT_USERNAME}\" -p \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"db.adminCommand({ ping: 1 }).ok\" | grep 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - workspace

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    profiles:
      - redis
      - cache
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - workspace

  memcached:
    image: ${MEMCACHED_IMAGE:-memcached:1.6-alpine}
    profiles:
      - memcached
      - cache
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MEMCACHED_PORT:-11211}:11211"
    networks:
      - workspace

  mailpit:
    image: ${MAILPIT_IMAGE:-axllent/mailpit:latest}
    profiles:
      - mail
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MAILPIT_SMTP_PORT:-1025}:1025"
      - "127.0.0.1:${MAILPIT_HTTP_PORT:-8025}:8025"
    networks:
      - workspace

  minio:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    profiles:
      - s3
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-app}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-app-password}
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks:
      - workspace

  minio-bucket:
    image: ${MINIO_MC_IMAGE:-minio/mc:latest}
    profiles:
      - s3
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-lc"]
    command: |
      mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}";
      mc mb --ignore-existing local/"$${MINIO_BUCKET}";
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-app}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-app-password}
      MINIO_BUCKET: ${MINIO_BUCKET:-app}
    networks:
      - workspace

  gotenberg:
    image: ${GOTENBERG_IMAGE:-gotenberg/gotenberg:8}
    profiles:
      - pdf
      - gotenberg
    restart: unless-stopped
    ports:
      - "127.0.0.1:${GOTENBERG_PORT:-13000}:3000"
    networks:
      - workspace

  queue-worker:
    build:
      <<: *php-build
      target: cli
    profiles:
      - queue
    working_dir: /app
    restart: unless-stopped
    environment:
      <<: *php-environment
    command: sh -lc "${QUEUE_COMMAND:-php psb queue:listen}"
    volumes:
      - *app-volume
      - composer_cache:/home/${USER_NAME:-dev}/.cache/composer
    networks:
      - workspace

  scheduler:
    build:
      <<: *php-build
      target: cli
    profiles:
      - scheduler
    working_dir: /app
    restart: unless-stopped
    environment:
      <<: *php-environment
    command: sh -lc "${SCHEDULER_COMMAND:-php psb schedule:work}"
    volumes:
      - *app-volume
      - composer_cache:/home/${USER_NAME:-dev}/.cache/composer
    networks:
      - workspace

  websocket:
    build:
      <<: *php-build
      target: cli
    profiles:
      - websocket
    working_dir: /app
    restart: unless-stopped
    environment:
      <<: *php-environment
      PUSHR_APP_ID: ${PUSHR_APP_ID:-app-1}
      PUSHR_SECRET: ${PUSHR_SECRET:-secret-1}
    command: sh -lc "${WEBSOCKET_COMMAND:-php psb pushr:serve --host=0.0.0.0 --port=8080 --app-id=app-1 --secret=secret-1}"
    ports:
      - "127.0.0.1:${WEBSOCKET_PORT:-8081}:8080"
    volumes:
      - *app-volume
      - composer_cache:/home/${USER_NAME:-dev}/.cache/composer
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - workspace

  tg-bot-polling:
    build:
      <<: *php-build
      target: cli
    profiles:
      - tg-bot-polling
      - telegram
    working_dir: /app
    restart: unless-stopped
    environment:
      <<: *php-environment
    command: sh -lc "${TG_BOT_POLLING_COMMAND:-php psb telegram:poll}"
    volumes:
      - *app-volume
      - composer_cache:/home/${USER_NAME:-dev}/.cache/composer
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - workspace

networks:
  workspace:
    driver: bridge

volumes:
  composer_cache:
  yarn_cache:
  frontend_yarn_cache:
  mariadb_data:
  postgres_data:
  mongodb_data:
  minio_data:
